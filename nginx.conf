server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy para Supabase - evita CORS
    # /supabase-proxy/rest/v1/agents -> https://pulsosocialv2-pulsosocialbdv3.dsb9vm.easypanel.host/rest/v1/agents
    # ^~ significa que este location tiene prioridad sobre regex
    location ^~ /supabase-proxy/ {
        # Resolver DNS para el upstream HTTPS
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        
        # El trailing slash en proxy_pass hace que NGINX reemplace el location match
        # /supabase-proxy/rest/v1/agents -> /rest/v1/agents
        proxy_pass https://pulsosocialv2-pulsosocialbdv3.dsb9vm.easypanel.host/;
        
        # Headers importantes
        proxy_set_header Host pulsosocialv2-pulsosocialbdv3.dsb9vm.easypanel.host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Soporte para HTTPS
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        
        # Headers CORS - permitir desde cualquier origen
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept, Origin, X-Client-IP, X-Forwarded-For' always;
        add_header Access-Control-Max-Age 86400 always;
        
        # Manejar preflight OPTIONS
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept, Origin, X-Client-IP, X-Forwarded-For';
            add_header Access-Control-Max-Age 86400;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }
    }

    # Handle SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}